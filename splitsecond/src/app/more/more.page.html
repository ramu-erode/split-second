<ion-header>
  <ion-toolbar>
    <ion-title>More</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <ion-list>
    @if (coach(); as c) {
      <ion-item>
        <ion-label>
          <h2>{{ c.displayName }}</h2>
          <p>{{ c.canScore ? 'Scorer / head coach' : 'Timer' }}</p>
        </ion-label>
      </ion-item>
    }
    <ion-item button (click)="signOut()">
      <ion-label>Sign out</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
