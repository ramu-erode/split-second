<ion-header>
  <ion-toolbar>
    <ion-title>More</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <ion-list>
    @if (coach(); as c) {
      <ion-item>
        <ion-label>
          <h2>{{ c.displayName }}</h2>
          <p>{{ c.canScore ? 'Scorer / head coach' : 'Timer' }}</p>
        </ion-label>
      </ion-item>
    }
    <ion-item button [disabled]="syncing()" (click)="refreshMeetData()">
      <ion-label>
        <h2>Refresh meet data</h2>
        <p>{{ syncing() ? 'Syncing…' : lastSyncedLabel() }}</p>
        @if (syncError(); as err) {
          <p>{{ err }}</p>
        }
      </ion-label>
      @if (syncing()) {
        <ion-spinner slot="end" name="crescent" />
      }
    </ion-item>
    <ion-item button (click)="signOut()">
      <ion-label>Sign out</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
